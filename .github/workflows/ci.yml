name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        run: npm ci
      - name: Lint
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        run: npm run lint --if-present
      - name: Test
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        run: npm test --if-present
      - name: Build
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        run: npm run build --if-present
      - name: Web scaffold notice
        if: ${{ hashFiles('apps/web/package.json') == '' }}
        run: echo "apps/web/package.json not found; skipping web checks for scaffold state."

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Create venv
        run: python -m venv .venv
      - name: Install deps
        run: |
          . .venv/bin/activate
          pip install -r requirements.txt
      - name: Lint
        run: |
          . .venv/bin/activate
          python -m pip install ruff
          ruff check .
      - name: Test
        run: |
          . .venv/bin/activate
          PYTHONPATH=. pytest -q
